<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="こけし在庫帳"/>
<title>こけし在庫帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Hiragino Sans','Yu Gothic',sans-serif}
body{background:#fdf6f0}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:70px}
.header{background:#6b2737;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.header-title{font-size:18px;font-weight:700;letter-spacing:2px}
.content{padding:12px 14px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;display:flex;border-top:1px solid #e0d6ce;z-index:20}
.nav-btn{flex:1;border:none;background:none;padding:8px 0;cursor:pointer;color:#999;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-family:inherit}
.nav-btn.active{color:#6b2737}
.nav-icon{font-size:20px}
.section-title{font-size:15px;font-weight:700;color:#4a1a24;margin-bottom:10px;margin-top:14px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.kpi-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700}
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.item-name{font-size:15px;font-weight:700;color:#2c1010;margin-bottom:2px}
.item-sub{font-size:12px;color:#888}
.price-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;margin-bottom:4px}
.price-tag{font-size:12px;color:#555;background:#f5f0eb;padding:2px 8px;border-radius:6px}
.row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.add-btn{background:#6b2737;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.sold-btn{background:#27ae60;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.edit-btn{background:#f0e6e8;color:#6b2737;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.qr-btn{background:#2980b9;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.return-btn{background:#e67e22;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.empty{text-align:center;color:#aaa;padding:30px;font-size:13px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal-box{background:#fff;width:100%;max-width:430px;border-radius:16px 16px 0 0;padding:20px 18px 32px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#4a1a24;margin-bottom:14px}
.close-btn{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#888}
.field-label{display:block;font-size:12px;color:#666;margin-bottom:3px;margin-top:10px}
.field-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fafafa;font-family:inherit}
.save-btn{margin-top:18px;width:100%;background:#6b2737;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.tab{display:none}.tab.active{display:block}
.status-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px}
.status-in{background:#eafaf1;color:#1e8449}
.status-sold{background:#f5f5f5;color:#999}
.code-badge{font-size:11px;color:#6b2737;font-weight:700;background:#fdf0f0;padding:2px 8px;border-radius:6px}
.photo-preview{width:100%;height:200px;object-fit:cover;border-radius:10px;margin-top:8px;display:none}
.photo-thumb{width:70px;height:70px;object-fit:cover;border-radius:8px;float:right;margin-left:10px}
.photo-upload{width:100%;border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#aaa;font-size:13px;margin-top:10px;background:#fafafa}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-btn{border:1px solid #ddd;background:#fff;border-radius:20px;padding:4px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.filter-btn.active{background:#6b2737;color:#fff;border-color:#6b2737}
.search-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;font-family:inherit;margin-bottom:10px}
.qr-container{display:flex;flex-direction:column;align-items:center;padding:20px}
.qr-label{margin-top:10px;font-size:13px;font-weight:700;color:#4a1a24;text-align:center}
.print-btn{background:#6b2737;color:#fff;border:none;border-radius:8px;padding:10px 30px;font-size:14px;cursor:pointer;font-family:inherit}
.price-label{width:91mm;height:55mm;border:2px solid #6b2737;border-radius:4mm;padding:5mm;display:inline-flex;flex-direction:column;justify-content:space-between;background:#fff}
.price-label-name{font-size:15px;font-weight:700;color:#2c1010}
.price-label-origin{font-size:11px;color:#888;margin-top:2px}
.price-label-price{font-size:24px;font-weight:700;color:#6b2737}
.price-label-code{font-size:10px;color:#aaa;margin-top:2px}
.price-label-bottom{display:flex;justify-content:space-between;align-items:flex-end}
#print-area{display:none}
@media print{body *{visibility:hidden}#print-area,#print-area *{visibility:visible}#print-area{position:fixed;top:0;left:0}}
</style>
</head>
<body>
<div id="print-area"></div>
<div id="app">
  <div class="header">
    <span class="nav-icon">&#128230;</span>
    <span class="header-title">こけし在庫帳</span>
  </div>
  <div class="content">
    <div id="tab-dashboard" class="tab active"></div>
    <div id="tab-items" class="tab"></div>
    <div id="tab-sales" class="tab"></div>
    <div id="tab-customers" class="tab"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard',this)"><span class="nav-icon">&#128202;</span>ダッシュボード</button>
    <button class="nav-btn" onclick="showTab('items',this)"><span class="nav-icon">&#128230;</span>在庫</button>
    <button class="nav-btn" onclick="showTab('sales',this)"><span class="nav-icon">&#128181;</span>販売記録</button>
    <button class="nav-btn" onclick="showTab('customers',this)"><span class="nav-icon">&#128101;</span>顧客</button>
  </div>
</div>
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()"></div>
<script>
const SB_URL="https://yjhhrqujmemlzghvvomx.supabase.co";
const SB_KEY="sb_publishable_utdf4r58eY6WQKMQbZ-2UA_rwUAQe2v";
let items=[],sales=[],customers=[],filterStatus='all',searchWord='';
const fmt=n=>'¥'+Number(n).toLocaleString();
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
async function sbFetch(path,opts={}){const res=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=representation',...(opts.headers||{})}});const text=await res.text();let data;try{data=JSON.parse(text)}catch(e){data=text}return{data,ok:res.ok}}
async function uploadPhoto(file){const ext=file.name.split('.').pop();const path='kokeshi-'+Date.now()+'.'+ext;const res=await fetch(SB_URL+'/storage/v1/object/kokeshi-photos/'+path,{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':file.type},body:file});if(!res.ok)return null;return SB_URL+'/storage/v1/object/public/kokeshi-photos/'+path}
async function load(){const[ri,rs,rc]=await Promise.all([sbFetch('items?select=*&order=created_at.desc'),sbFetch('sales?select=*&order=sold_at.desc'),sbFetch('customers?select=*&order=created_at.desc')]);items=Array.isArray(ri.data)?ri.data:[];sales=Array.isArray(rs.data)?rs.data:[];customers=Array.isArray(rc.data)?rc.data:[];renderAll()}
function renderAll(){renderDashboard();renderItems();renderSales();renderCustomers()}
function kpi(l,v,c){return '<div class="kpi-card" style="border-top:3px solid '+c+'"><div class="kpi-label">'+l+'</div><div class="kpi-value" style="color:'+c+'">'+v+'</div></div>'}
function renderDashboard(){
  const inStock=items.filter(i=>i.status==='in_stock');
  const soldItems=items.filter(i=>i.status==='sold');
  const totalSell=sales.reduce((s,s2)=>s+(s2.sell_price||0),0);
  const totalNet=sales.reduce((s,s2)=>s+(s2.net_profit!=null?s2.net_profit:(s2.sell_price||0)-(items.find(i=>i.id===s2.item_id)||{}).buy_price||0),0);
  let h='<h2 class="section-title">サマリー</h2><div class="card-grid">'+kpi('在庫数',inStock.length+'点','#c0392b')+kpi('売済数',soldItems.length+'点','#27ae60')+kpi('売上合計',fmt(totalSell),'#2980b9')+kpi('純利合計',fmt(totalNet),totalNet>=0?'#8e44ad':'#e74c3c')+'</div>';
  h+='<h2 class="section-title">最近登録したこけし</h2>';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="add-btn" style="background:#27ae60;flex:1" onclick="exportCSV(\'items\')">&#128229; 在庫CSV</button><button class="add-btn" style="background:#2980b9;flex:1" onclick="exportCSV(\'sales\')">&#128229; 販売記録CSV</button></div>';
  items.slice(0,5).forEach(i=>{h+=itemCard(i,true)});
  h+='<div id="graph-area"></div>';
  document.getElementById('tab-dashboard').innerHTML=h;
  setTimeout(function(){renderGraph()},100);
}
function exportCSV(type){
  let csv,filename;
  if(type==='items'){
    csv='管理コード,名前,産地,種類,仕入値,売値,送料,ステータス,メモ,登録日\n';
    items.forEach(function(i){csv+=[i.code,i.name,i.origin,i.type,i.buy_price,i.sell_price,i.shipping_fee||0,i.status==='in_stock'?'在庫中':'売済み',i.note||'',(i.created_at||'').slice(0,10)].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"'}).join(',')+'\n'});
    filename='kokeshi-inventory-'+today()+'.csv';
  }else{
    csv='管理コード,こけし名,顧客名,販売価格,仕入値,手数料率,広告費率,手数料,広告費,送料,純利益,販売日,メモ\n';
    sales.forEach(function(s){const item=items.find(function(i){return i.id===s.item_id})||{};const customer=customers.find(function(c){return c.id===s.customer_id})||{};const fee=Math.round((s.sell_price||0)*(s.fee_rate||0)/100);const adFee=Math.round((s.sell_price||0)*(s.ad_rate||0)/100);csv+=[item.code||'',item.name||'不明',customer.name||'',s.sell_price,item.buy_price||0,s.fee_rate||0,s.ad_rate||0,fee,adFee,s.shipping_fee||0,s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0),s.sold_at||'',s.note||''].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"'}).join(',')+'\n'});
    filename='kokeshi-sales-'+today()+'.csv';
  }
  const encoded=encodeURIComponent('\uFEFF'+csv);
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encoded;
  a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function renderGraph(){
  const monthlyData={};
  sales.forEach(function(s){const month=(s.sold_at||'').slice(0,7);if(!month)return;if(!monthlyData[month])monthlyData[month]={revenue:0,net:0};monthlyData[month].revenue+=s.sell_price||0;const item=items.find(function(i){return i.id===s.item_id})||{};monthlyData[month].net+=s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0)});
  const months=Object.keys(monthlyData).sort().slice(-6);
  const revenues=months.map(function(m){return monthlyData[m].revenue});
  const nets=months.map(function(m){return monthlyData[m].net});
  const labels=months.map(function(m){return m.replace('-','/')});
  const el=document.getElementById('graph-area');if(!el)return;
  if(!sales.length){el.innerHTML='';return}
  let h='<h2 class="section-title">売上グラフ（直近6ヶ月）</h2>';
  h+='<div class="card"><canvas id="revenue-chart"></canvas></div>';
  h+='<div class="card"><canvas id="profit-chart"></canvas></div>';
  el.innerHTML=h;
  new Chart(document.getElementById('revenue-chart'),{type:'bar',data:{labels:labels,datasets:[{label:'売上',data:revenues,backgroundColor:'#2980b9'}]},options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:'月別売上'}}}});
  new Chart(document.getElementById('profit-chart'),{type:'bar',data:{labels:labels,datasets:[{label:'純利益',data:nets,backgroundColor:nets.map(function(p){return p>=0?'#27ae60':'#e74c3c'})}]},options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:'月別純利益'}}}});
}
function itemCard(item,compact){
  const sold=item.status==='sold';
  let h='<div class="card">';
  if(item.photo_url)h+='<img src="'+esc(item.photo_url)+'" class="photo-thumb" onerror="this.style.display=\'none\'">';
  h+='<div class="row-between"><div><span class="code-badge">'+esc(item.code)+'</span> <span class="status-badge '+(sold?'status-sold':'status-in')+'">'+(sold?'売済み':'在庫中')+'</span></div></div>';
  h+='<div class="item-name" style="margin-top:6px">'+esc(item.name)+'</div>';
  h+='<div class="item-sub">'+esc(item.origin)+' / '+esc(item.type)+'</div>';
  h+='<div class="price-row"><span class="price-tag">仕入 '+fmt(item.buy_price)+'</span><span class="price-tag">売値 '+fmt(item.sell_price)+'</span>'+(item.shipping_fee?'<span class="price-tag">送料 '+fmt(item.shipping_fee)+'</span>':'')+'</div>';
  if(item.listing_site&&item.listing_url){h+='<div style="margin-top:4px"><a href="'+esc(item.listing_url)+'" target="_blank" style="font-size:12px;color:#2980b9;text-decoration:none">&#128279; '+esc(item.listing_site)+'で出品中</a></div>';}
  if(!compact){
    h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
    h+='<button class="edit-btn" onclick="openEditItem('+item.id+')">編集</button>';
    h+='<button class="qr-btn" onclick="showQR('+item.id+')">QR/値札</button>';
    if(!sold)h+='<button class="sold-btn" onclick="openSell('+item.id+')">販売する</button>';
    if(sold)h+='<button class="return-btn" onclick="returnToStock('+item.id+')">在庫に戻す</button>';
    h+='</div>';
  }
  h+='<div style="clear:both"></div></div>';
  return h;
}
function renderItems(){const filtered=items.filter(i=>{if(filterStatus==='in_stock'&&i.status!=='in_stock')return false;if(filterStatus==='sold'&&i.status!=='sold')return false;if(searchWord&&!((i.name||'').includes(searchWord)||(i.code||'').includes(searchWord)||(i.origin||'').includes(searchWord)))return false;return true});let h='<div class="row-between"><h2 class="section-title">在庫一覧</h2><button class="add-btn" onclick="openAddItem()">+ 登録</button></div>';h+='<input class="search-input" placeholder="名前・産地・コードで検索" oninput="searchWord=this.value;renderItems()" value="'+esc(searchWord)+'">';h+='<div class="filter-row"><button class="filter-btn'+(filterStatus==='all'?' active':'')+'" onclick="filterStatus=\'all\';renderItems()">すべて</button><button class="filter-btn'+(filterStatus==='in_stock'?' active':'')+'" onclick="filterStatus=\'in_stock\';renderItems()">在庫中</button><button class="filter-btn'+(filterStatus==='sold'?' active':'')+'" onclick="filterStatus=\'sold\';renderItems()">売済み</button></div>';if(!filtered.length)h+='<div class="empty">該当するこけしがありません</div>';filtered.forEach(item=>{h+=itemCard(item,false)});document.getElementById('tab-items').innerHTML=h}
function renderSales(){let h='<h2 class="section-title">販売記録</h2>';if(!sales.length)h+='<div class="empty">販売記録がありません</div>';sales.forEach(s=>{const item=items.find(i=>i.id===s.item_id)||{};const customer=customers.find(c=>c.id===s.customer_id)||{};const net=s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0);h+='<div class="card"><div class="row-between"><span class="code-badge">'+esc(item.code||'-')+'</span><span class="item-sub">'+esc(s.sold_at)+'</span></div><div class="item-name">'+esc(item.name||'不明')+'</div>'+(customer.name?'<div class="item-sub">&#128100; '+esc(customer.name)+'</div>':'')+'<div class="price-row"><span class="price-tag">販売 '+fmt(s.sell_price)+'</span>'+(s.fee_rate?'<span class="price-tag">手数料'+s.fee_rate+'%</span>':'')+(s.ad_rate?'<span class="price-tag">広告'+s.ad_rate+'%</span>':'')+(s.shipping_fee?'<span class="price-tag">送料 '+fmt(s.shipping_fee)+'</span>':'')+'<span class="price-tag" style="color:'+(net>=0?'#27ae60':'#e74c3c')+';font-weight:700">純利 '+fmt(net)+'</span></div>'+(s.note?'<div class="item-sub">'+esc(s.note)+'</div>':'')+'</div>'});document.getElementById('tab-sales').innerHTML=h}
function renderCustomers(){
  let h='<div class="row-between"><h2 class="section-title">顧客一覧</h2><button class="add-btn" onclick="openAddCustomer()">+ 追加</button></div>';
  if(!customers.length){h+='<div class="empty">顧客を登録してください</div>';document.getElementById('tab-customers').innerHTML=h;return}
  customers.forEach(function(c){
    const cSales=sales.filter(function(s){return s.customer_id===c.id});
    const total=cSales.reduce(function(s,t){return s+(t.sell_price||0)},0);
    h+='<div class="card"><div class="row-between"><div><div class="item-name">'+esc(c.name)+'</div><div class="item-sub">'+esc(c.contact||'')+'</div></div><button class="edit-btn" onclick="openEditCustomer('+c.id+')">編集</button></div>';
    h+='<div class="price-row"><span class="price-tag">購入回数: '+cSales.length+'回</span><span class="price-tag">累計: '+fmt(total)+'</span></div>';
    if(c.note)h+='<div class="item-sub" style="margin-top:4px">📝 '+esc(c.note)+'</div>';
    if(cSales.length){h+='<div style="margin-top:8px"><div class="item-sub" style="margin-bottom:4px">購入履歴:</div>';cSales.slice(0,3).forEach(function(s){const item=items.find(function(i){return i.id===s.item_id})||{};h+='<div class="item-sub">・'+esc(item.name||'不明')+' '+fmt(s.sell_price)+' ('+esc(s.sold_at)+')</div>'});if(cSales.length>3)h+='<div class="item-sub">他 '+(cSales.length-3)+'件...</div>';h+='</div>';}
    h+='</div>';
  });
  document.getElementById('tab-customers').innerHTML=h;
}
function showTab(tab,btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active')}
function showQR(id){const item=items.find(i=>i.id===id);if(!item)return;const url=location.origin+'?code='+encodeURIComponent(item.code);document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">QRコード / 値札</div><div class="qr-container"><div id="qr-canvas"></div><div class="qr-label">'+esc(item.code)+'<br>'+esc(item.name)+'</div></div><button class="print-btn" style="margin-top:14px;width:100%" onclick="printLabel('+id+')">&#128438; 値札を印刷</button></div>';document.getElementById('modal').classList.add('show');setTimeout(function(){new QRCode(document.getElementById('qr-canvas'),{text:url,width:180,height:180,colorDark:'#6b2737',colorLight:'#ffffff'})},100)}
function printLabel(id){const item=items.find(i=>i.id===id);if(!item)return;const url=location.origin+'?code='+encodeURIComponent(item.code);const pa=document.getElementById('print-area');pa.innerHTML='<div class="price-label"><div><div class="price-label-name">'+esc(item.name)+'</div><div class="price-label-origin">産地: '+esc(item.origin)+'</div></div><div class="price-label-bottom"><div><div class="price-label-price">'+fmt(item.sell_price)+'</div><div class="price-label-code">'+esc(item.code)+'</div></div><div id="label-qr"></div></div></div>';pa.style.display='block';setTimeout(function(){new QRCode(document.getElementById('label-qr'),{text:url,width:75,height:75,colorDark:'#6b2737',colorLight:'#ffffff'});setTimeout(function(){window.print();pa.style.display='none'},400)},100)}
function updateCode(){const origin=document.getElementById('f-origin').value;const prefix=(origin||'').slice(0,2)||'??';const existing=items.filter(i=>(i.code||'').startsWith(prefix));const num=String(existing.length+1).padStart(3,'0');document.getElementById('f-code').value=prefix+'-'+num}
function previewPhoto(input){if(input.files&&input.files[0]){const reader=new FileReader();reader.onload=e=>{const img=document.getElementById('photo-preview');img.src=e.target.result;img.style.display='block'};reader.readAsDataURL(input.files[0])}}

etElementById(\'f-photo\').click()">&#128247; タップして写真を選択</div><input type="file" id="f-photo" accept="image/*" style="display:none" onchange="previewPhoto(this)"><img id="photo-preview" class="photo-preview"><button class="save-btn" onclick="saveItem('+id+')">保存する</button></div>';document.getElementById('modal').classList.add('show')}
async function saveItem(id){const name=document.getElementById('f-name').value;const origin=document.getElementById('f-origin').value;const buy=+document.getElementById('f-buy').value;const sell=+document.getElementById('f-sell').value;if(!name||!origin||!buy||!sell)return alert('必須項目を入力してください');const code=document.getElementById('f-code').value;const type=document.getElementById('f-type').value;const note=document.getElementById('f-note').value;const shipping_fee=+document.getElementById('f-shipping').value||0;const listing_site=document.getElementById('f-site')?document.getElementById('f-site').value:'';const listing_url=document.getElementById('f-url')?document.getElementById('f-url').value:'';let photo_url=id?(items.find(i=>i.id===id)||{}).photo_url:null;const photoFile=document.getElementById('f-photo').files[0];if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}const row={code,name,origin,type,buy_price:buy,sell_price:sell,note,photo_url,listing_site,listing_url,shipping_fee};if(id)await sbFetch('items?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});else await sbFetch('items',{method:'POST',body:JSON.stringify(row)});await load();closeModal()}
function calcNetProfit(){
  const price=+document.getElementById('f-sprice').value||0;
  const rate=+document.getElementById('f-fee-rate').value||0;
  const adRate=+document.getElementById('f-ad-rate').value||0;
  const ship=+document.getElementById('f-ship').value||0;
  const buyPrice=+document.getElementById('f-buy-hidden').value||0;
  const fee=Math.round(price*rate/100);
  const adFee=Math.round(price*adRate/100);
  const net=price-buyPrice-fee-adFee-ship;
  document.getElementById('f-fee-calc').textContent='手数料: ¥'+fee.toLocaleString()+' / 広告費: ¥'+adFee.toLocaleString();
  document.getElementById('f-net-calc').textContent='純利益: ¥'+net.toLocaleString();
  document.getElementById('f-net-calc').style.color=net>=0?'#27ae60':'#e74c3c';
}
function openSell(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const site=item.listing_site||'';
  const defaultRate=site==='メルカリ'?10:site==='ヤフオク'?10:site==='ラクマ'?6:0;
  const defaultAd=site==='メルカリ'?5:0;
  const defaultShip=item.shipping_fee||0;
  document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">販売登録</div><div class="card" style="margin-bottom:14px"><div class="item-name">'+esc(item.name)+'</div><div class="item-sub">'+esc(item.code)+(site?' / '+esc(site):'')+'</div></div><input type="hidden" id="f-buy-hidden" value="'+item.buy_price+'"><label class="field-label">販売価格(円)</label><input class="field-input" id="f-sprice" type="number" value="'+item.sell_price+'" oninput="calcNetProfit()"><label class="field-label">販売手数料率(%)</label><input class="field-input" id="f-fee-rate" type="number" value="'+defaultRate+'" oninput="calcNetProfit()"><label class="field-label">広告費率(%)</label><input class="field-input" id="f-ad-rate" type="number" value="'+defaultAd+'" oninput="calcNetProfit()"><label class="field-label">送料(円)</label><input class="field-input" id="f-ship" type="number" value="'+defaultShip+'" oninput="calcNetProfit()"><div style="background:#f5f0eb;border-radius:8px;padding:10px;margin-top:12px"><div id="f-fee-calc" style="font-size:13px;color:#888;margin-bottom:4px">手数料: ¥0 / 広告費: ¥0</div><div id="f-net-calc" style="font-size:16px;font-weight:700;color:#27ae60">純利益: ¥0</div></div><label class="field-label">販売日</label><input class="field-input" id="f-sdate" type="date" value="'+today()+'"><label class="field-label">顧客</label><select class="field-input" id="f-customer"><option value="">選択しない</option>'+customers.map(function(c){return'<option value="'+c.id+'">'+esc(c.name)+'</option>'}).join('')+'</select><label class="field-label">メモ</label><input class="field-input" id="f-snote" placeholder="任意"><button class="save-btn" style="background:#27ae60" onclick="saveSell('+id+')">販売確定</button></div>';
  document.getElementById('modal').classList.add('show');
  calcNetProfit();
}
