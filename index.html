<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Hiragino Sans','Yu Gothic',sans-serif}
body{background:#fdf6f0}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:70px}
.header{background:#6b2737;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.header-title{font-size:18px;font-weight:700;letter-spacing:2px}
.content{padding:12px 14px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;display:flex;border-top:1px solid #e0d6ce;z-index:20}
.nav-btn{flex:1;border:none;background:none;padding:8px 0;cursor:pointer;color:#999;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-family:inherit}
.nav-btn.active{color:#6b2737}
.nav-icon{font-size:20px}
.section-title{font-size:15px;font-weight:700;color:#4a1a24;margin-bottom:10px;margin-top:14px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.kpi-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700}
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.item-name{font-size:15px;font-weight:700;color:#2c1010;margin-bottom:2px}
.item-sub{font-size:12px;color:#888}
.price-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;margin-bottom:4px}
.price-tag{font-size:12px;color:#555;background:#f5f0eb;padding:2px 8px;border-radius:6px}
.row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.add-btn{background:#6b2737;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.sold-btn{background:#27ae60;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.edit-btn{background:#f0e6e8;color:#6b2737;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.qr-btn{background:#2980b9;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.return-btn{background:#e67e22;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.empty{text-align:center;color:#aaa;padding:30px;font-size:13px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal-box{background:#fff;width:100%;max-width:430px;border-radius:16px 16px 0 0;padding:20px 18px 32px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#4a1a24;margin-bottom:14px}
.close-btn{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#888}
.field-label{display:block;font-size:12px;color:#666;margin-bottom:3px;margin-top:10px}
.field-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fafafa;font-family:inherit}
.save-btn{margin-top:18px;width:100%;background:#6b2737;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.tab{display:none}.tab.active{display:block}
.status-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px}
.status-in{background:#eafaf1;color:#1e8449}
.status-sold{background:#f5f5f5;color:#999}
.code-badge{font-size:11px;color:#6b2737;font-weight:700;background:#fdf0f0;padding:2px 8px;border-radius:6px}
.photo-preview{width:100%;height:200px;object-fit:cover;border-radius:10px;margin-top:8px;display:none}
.photo-thumb{width:70px;height:70px;object-fit:cover;border-radius:8px;float:right;margin-left:10px}
.photo-upload{width:100%;border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#aaa;font-size:13px;margin-top:10px;background:#fafafa}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-btn{border:1px solid #ddd;background:#fff;border-radius:20px;padding:4px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.filter-btn.active{background:#6b2737;color:#fff;border-color:#6b2737}
.search-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;font-family:inherit;margin-bottom:10px}
.qr-container{display:flex;flex-direction:column;align-items:center;padding:20px}
.qr-label{margin-top:10px;font-size:13px;font-weight:700;color:#4a1a24;text-align:center}
.print-btn{background:#6b2737;color:#fff;border:none;border-radius:8px;padding:10px 30px;font-size:14px;cursor:pointer;font-family:inherit}
.price-label{width:91mm;height:55mm;border:2px solid #6b2737;border-radius:4mm;padding:5mm;display:inline-flex;flex-direction:column;justify-content:space-between;background:#fff}
.price-label-name{font-size:15px;font-weight:700;color:#2c1010}
.price-label-origin{font-size:11px;color:#888;margin-top:2px}
.price-label-price{font-size:24px;font-weight:700;color:#6b2737}
.price-label-code{font-size:10px;color:#aaa;margin-top:2px}
.price-label-bottom{display:flex;justify-content:space-between;align-items:flex-end}
#print-area{display:none}
@media print{body *{visibility:hidden}#print-area,#print-area *{visibility:visible}#print-area{position:fixed;top:0;left:0}}

/* 仕入帳スクリーン */
.purchase-screen{display:none;position:fixed;inset:0;background:#f0f4f0;z-index:100;overflow-y:auto;padding-bottom:70px}
.purchase-screen.show{display:block}
.purchase-inner{max-width:430px;margin:0 auto;min-height:100vh}
.purchase-header{background:#2c5f2e;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:110}
.purchase-title{font-size:18px;font-weight:700;letter-spacing:2px}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0}
.purchase-content{padding:12px 14px}
.purchase-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;display:flex;border-top:1px solid #d0e0d0;z-index:120}
.purchase-nav-btn{flex:1;border:none;background:none;padding:8px 0;cursor:pointer;color:#999;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-family:inherit}
.purchase-nav-btn.active{color:#2c5f2e}
.purchase-tab{display:none}
.purchase-tab.active{display:block}
.source-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;background:#e8f5e9;color:#2c5f2e}
.calc-box{background:#e8f5e9;border-radius:8px;padding:12px;margin-top:12px}
.calc-result{font-size:20px;font-weight:700;color:#2c5f2e;margin-top:4px}
.p-add-btn{background:#2c5f2e;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.p-edit-btn{background:#e8f5e9;color:#2c5f2e;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.p-link-btn{background:#2980b9;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.p-save-btn{margin-top:18px;width:100%;background:#2c5f2e;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.p-kpi-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
</style>
</head>
<body>
<div id="print-area"></div>

<!-- 仕入帳スクリーン -->
<div class="purchase-screen" id="purchase-screen">
  <div class="purchase-inner">
    <div class="purchase-header">
      <button class="back-btn" onclick="closePurchase()">&#8592;</button>
      <span class="nav-icon">&#128230;</span>
      <span class="purchase-title">こけし仕入帳</span>
    </div>
    <div class="purchase-content">
      <div id="purchase-tab-dashboard" class="purchase-tab active"></div>
      <div id="purchase-tab-list" class="purchase-tab"></div>
    </div>
  </div>
  <div class="purchase-nav">
    <button class="purchase-nav-btn active" id="purchase-nav-dashboard" onclick="showPurchaseTab('dashboard',this)"><span class="nav-icon">&#128202;</span>サマリー</button>
    <button class="purchase-nav-btn" id="purchase-nav-list" onclick="showPurchaseTab('list',this)"><span class="nav-icon">&#128230;</span>仕入記録</button>
  </div>
</div>

<!-- メインアプリ -->
<div id="app">
  <div class="header">
    <span class="nav-icon">&#128230;</span>
    <span class="header-title">こけし在庫帳</span>
  </div>
  <div class="content">
    <div id="tab-dashboard" class="tab active"></div>
    <div id="tab-items" class="tab"></div>
    <div id="tab-sales" class="tab"></div>
    <div id="tab-customers" class="tab"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard',this)"><span class="nav-icon">&#128202;</span>ダッシュボード</button>
    <button class="nav-btn" onclick="showTab('items',this)"><span class="nav-icon">&#128230;</span>在庫</button>
    <button class="nav-btn" onclick="showTab('sales',this)"><span class="nav-icon">&#128181;</span>販売記録</button>
    <button class="nav-btn" onclick="showTab('customers',this)"><span class="nav-icon">&#128101;</span>顧客</button>
  </div>
</div>

<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()"></div>

<script>
const SB_URL="https://yjhhrqujmemlzghvvomx.supabase.co";
const SB_KEY="sb_publishable_utdf4r58eY6WQKMQbZ-2UA_rwUAQe2v";
let items=[],sales=[],customers=[],purchases=[],filterStatus='all',searchWord='';
const fmt=n=>'¥'+Number(n).toLocaleString();
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const SOURCE_TYPES=[{value:'mercari',label:'メルカリ'},{value:'yahoo',label:'ヤフオク'},{value:'rakuma',label:'ラクマ'},{value:'flea',label:'フリーマーケット'},{value:'antique',label:'骨董市'},{value:'shop',label:'骨董店'},{value:'other',label:'その他'}];

async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=representation',...(opts.headers||{})}});
  const text=await res.text();
  let data;try{data=JSON.parse(text)}catch(e){data=text}
  return{data,ok:res.ok}
}

async function uploadPhoto(file){
  const ext=file.name.split('.').pop();
  const path='kokeshi-'+Date.now()+'.'+ext;
  const res=await fetch(SB_URL+'/storage/v1/object/kokeshi-photos/'+path,{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':file.type},body:file});
  if(!res.ok)return null;
  return SB_URL+'/storage/v1/object/public/kokeshi-photos/'+path
}

async function load(){
  const[ri,rs,rc]=await Promise.all([
    sbFetch('items?select=*&order=created_at.desc'),
    sbFetch('sales?select=*&order=sold_at.desc'),
    sbFetch('customers?select=*&order=created_at.desc')
  ]);
  items=Array.isArray(ri.data)?ri.data:[];
  sales=Array.isArray(rs.data)?rs.data:[];
  customers=Array.isArray(rc.data)?rc.data:[];
  renderAll()
}

function renderAll(){renderDashboard();renderItems();renderSales();renderCustomers()}

function kpi(l,v,c){return '<div class="kpi-card" style="border-top:3px solid '+c+'"><div class="kpi-label">'+l+'</div><div class="kpi-value" style="color:'+c+'">'+v+'</div></div>'}

function renderDashboard(){
  const inStock=items.filter(i=>i.status==='in_stock');
  const soldItems=items.filter(i=>i.status==='sold');
  const totalSell=sales.reduce((s,s2)=>s+(s2.sell_price||0),0);
  const totalNet=sales.reduce((s,s2)=>s+(s2.net_profit!=null?s2.net_profit:(s2.sell_price||0)-(items.find(i=>i.id===s2.item_id)||{}).buy_price||0),0);
  let h='<h2 class="section-title">サマリー</h2><div class="card-grid">'+kpi('在庫数',inStock.length+'点','#c0392b')+kpi('売済数',soldItems.length+'点','#27ae60')+kpi('売上合計',fmt(totalSell),'#2980b9')+kpi('純利合計',fmt(totalNet),totalNet>=0?'#8e44ad':'#e74c3c')+'</div>';
  h+='<button onclick="openPurchase()" style="width:100%;background:#2c5f2e;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;margin-bottom:4px;font-family:inherit">&#128230; 仕入帳を開く</button>';
  h+='<h2 class="section-title">最近登録したこけし</h2>';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="add-btn" style="background:#27ae60;flex:1" onclick="exportCSV(\'items\')">&#128229; 在庫CSV</button><button class="add-btn" style="background:#2980b9;flex:1" onclick="exportCSV(\'sales\')">&#128229; 販売記録CSV</button></div>';
  items.slice(0,5).forEach(i=>{h+=itemCard(i,true)});
  h+='<div id="graph-area"></div>';
  document.getElementById('tab-dashboard').innerHTML=h;
  setTimeout(function(){renderGraph()},100);
}

function exportCSV(type){
  let csv,filename;
  if(type==='items'){
    csv='管理コード,名前,産地,種類,仕入値,売値,送料,ステータス,メモ,登録日\n';
    items.forEach(function(i){csv+=[i.code,i.name,i.origin,i.type,i.buy_price,i.sell_price,i.shipping_fee||0,i.status==='in_stock'?'在庫中':'売済み',i.note||'',(i.created_at||'').slice(0,10)].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"'}).join(',')+'\n'});
    filename='kokeshi-inventory-'+today()+'.csv';
  }else{
    csv='管理コード,こけし名,顧客名,販売価格,仕入値,手数料率,広告費率,手数料,広告費,送料,純利益,販売日,メモ\n';
    sales.forEach(function(s){
      const item=items.find(function(i){return i.id===s.item_id})||{};
      const customer=customers.find(function(c){return c.id===s.customer_id})||{};
      const fee=Math.round((s.sell_price||0)*(s.fee_rate||0)/100);
      const adFee=Math.round((s.sell_price||0)*(s.ad_rate||0)/100);
      csv+=[item.code||'',item.name||'不明',customer.name||'',s.sell_price,item.buy_price||0,s.fee_rate||0,s.ad_rate||0,fee,adFee,s.shipping_fee||0,s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0),s.sold_at||'',s.note||''].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"'}).join(',')+'\n'
    });
    filename='kokeshi-sales-'+today()+'.csv';
  }
  const encoded=encodeURIComponent('\uFEFF'+csv);
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encoded;
  a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a)
}

function renderGraph(){
  const monthlyData={};
  sales.forEach(function(s){
    const month=(s.sold_at||'').slice(0,7);
    if(!month)return;
    if(!monthlyData[month])monthlyData[month]={revenue:0,net:0};
    monthlyData[month].revenue+=s.sell_price||0;
    const item=items.find(function(i){return i.id===s.item_id})||{};
    monthlyData[month].net+=s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0)
  });
  const months=Object.keys(monthlyData).sort().slice(-6);
  const revenues=months.map(function(m){return monthlyData[m].revenue});
  const nets=months.map(function(m){return monthlyData[m].net});
  const labels=months.map(function(m){return m.replace('-','/')});
  const el=document.getElementById('graph-area');
  if(!el)return;
  if(!sales.length){el.innerHTML='';return}
  let h='<h2 class="section-title">売上グラフ（直近6ヶ月）</h2>';
  h+='<div class="card"><canvas id="revenue-chart"></canvas></div>';
  h+='<div class="card"><canvas id="profit-chart"></canvas></div>';
  el.innerHTML=h;
  new Chart(document.getElementById('revenue-chart'),{type:'bar',data:{labels:labels,datasets:[{label:'売上',data:revenues,backgroundColor:'#2980b9'}]},options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:'月別売上'}}}});
  new Chart(document.getElementById('profit-chart'),{type:'bar',data:{labels:labels,datasets:[{label:'純利益',data:nets,backgroundColor:nets.map(function(p){return p>=0?'#27ae60':'#e74c3c'})}]},options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:'月別純利益'}}}})
}

function itemCard(item,compact){
  const sold=item.status==='sold';
  let h='<div class="card">';
  if(item.photo_url)h+='<img src="'+esc(item.photo_url)+'" class="photo-thumb" onerror="this.style.display=\'none\'">';
  h+='<div class="row-between"><div><span class="code-badge">'+esc(item.code)+'</span> <span class="status-badge '+(sold?'status-sold':'status-in')+'">'+(sold?'売済み':'在庫中')+'</span></div></div>';
  h+='<div class="item-name" style="margin-top:6px">'+esc(item.name)+'</div>';
  h+='<div class="item-sub">'+esc(item.origin)+' / '+esc(item.type)+'</div>';
  h+='<div class="price-row"><span class="price-tag">仕入 '+fmt(item.buy_price)+'</span><span class="price-tag">売値 '+fmt(item.sell_price)+'</span>'+(item.shipping_fee?'<span class="price-tag">送料 '+fmt(item.shipping_fee)+'</span>':'')+'</div>';
  if(item.listing_site&&item.listing_url){h+='<div style="margin-top:4px"><a href="'+esc(item.listing_url)+'" target="_blank" style="font-size:12px;color:#2980b9;text-decoration:none">&#128279; '+esc(item.listing_site)+'で出品中</a></div>';}
  if(!compact){
    h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><button class="edit-btn" onclick="openEditItem('+item.id+')">編集</button><button class="qr-btn" onclick="showQR('+item.id+')">QR/値札</button>';
    if(!sold)h+='<button class="sold-btn" onclick="openSell('+item.id+')">販売する</button>';
    if(sold)h+='<button class="return-btn" onclick="returnToStock('+item.id+')">在庫に戻す</button>';
    h+='</div>';
  }
  h+='<div style="clear:both"></div></div>';
  return h
}

function renderItems(){
  const filtered=items.filter(i=>{
    if(filterStatus==='in_stock'&&i.status!=='in_stock')return false;
    if(filterStatus==='sold'&&i.status!=='sold')return false;
    if(searchWord&&!((i.name||'').includes(searchWord)||(i.code||'').includes(searchWord)||(i.origin||'').includes(searchWord)))return false;
    return true
  });
  let h='<div class="row-between"><h2 class="section-title">在庫一覧</h2><button class="add-btn" onclick="openAddItem()">+ 登録</button></div>';
  h+='<input class="search-input" placeholder="名前・産地・コードで検索" oninput="searchWord=this.value;renderItems()" value="'+esc(searchWord)+'">';
  h+='<div class="filter-row"><button class="filter-btn'+(filterStatus==='all'?' active':'')+'" onclick="filterStatus=\'all\';renderItems()">すべて</button><button class="filter-btn'+(filterStatus==='in_stock'?' active':'')+'" onclick="filterStatus=\'in_stock\';renderItems()">在庫中</button><button class="filter-btn'+(filterStatus==='sold'?' active':'')+'" onclick="filterStatus=\'sold\';renderItems()">売済み</button></div>';
  if(!filtered.length)h+='<div class="empty">該当するこけしがありません</div>';
  filtered.forEach(item=>{h+=itemCard(item,false)});
  document.getElementById('tab-items').innerHTML=h
}

function renderSales(){
  let h='<h2 class="section-title">販売記録</h2>';
  if(!sales.length)h+='<div class="empty">販売記録がありません</div>';
  sales.forEach(s=>{
    const item=items.find(i=>i.id===s.item_id)||{};
    const customer=customers.find(c=>c.id===s.customer_id)||{};
    const net=s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0);

  customers.forEach(function(c){

async function saveItem(id){
  const name=document.getElementById('f-name').value;
  const origin=document.getElementById('f-origin').value;
  const buy=+document.getElementById('f-buy').value;
  const sell=+document.getElementById('f-sell').value;
  if(!name||!origin||!buy||!sell)return alert('必須項目を入力してください');
  const code=document.getElementById('f-code').value;
  const type=document.getElementById('f-type').value;
  const note=document.getElementById('f-note').value;
  const shipping_fee=+document.getElementById('f-shipping').value||0;
  const listing_site=document.getElementById('f-site')?document.getElementById('f-site').value:'';
  const listing_url=document.getElementById('f-url')?document.getElementById('f-url').value:'';
  let photo_url=id?(items.find(i=>i.id===id)||{}).photo_url:null;
  const photoFile=document.getElementById('f-photo').files[0];
  if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}
  const row={code,name,origin,type,buy_price:buy,sell_price:sell,note,photo_url,listing_site,listing_url,shipping_fee};
  if(id)await sbFetch('items?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});
  else await sbFetch('items',{method:'POST',body:JSON.stringify(row)});
  await load();closeModal()
}

function calcNetProfit(){
  const price=+document.getElementById('f-sprice').value||0;
  const rate=+document.getElementById('f-fee-rate').value||0;
  const adRate=+document.getElementById('f-ad-rate').value||0;
  const ship=+document.getElementById('f-ship').value||0;
  const buyPrice=+document.getElementById('f-buy-hidden').value||0;
  const fee=Math.round(price*rate/100);
  const adFee=Math.round(price*adRate/100);
  const net=price-buyPrice-fee-adFee-ship;
  document.getElementById('f-fee-calc').textContent='手数料: ¥'+fee.toLocaleString()+' / 広告費: ¥'+adFee.toLocaleString();
  document.getElementById('f-net-calc').textContent='純利益: ¥'+net.toLocaleString();
  document.getElementById('f-net-calc').style.color=net>=0?'#27ae60':'#e74c3c'
}

async function saveSell(itemId){
  const price=+document.getElementById('f-sprice').value;
  const date=document.getElementById('f-sdate').value;
  const note=document.getElementById('f-snote').value;
  const fee_rate=+document.getElementById('f-fee-rate').value||0;
  const ad_rate=+document.getElementById('f-ad-rate').value||0;
  const shipping_fee=+document.getElementById('f-ship').value||0;
  const customer_id=document.getElementById('f-customer')?+document.getElementById('f-customer').value||null:null;
  const buyPrice=+document.getElementById('f-buy-hidden').value||0;
  const fee=Math.round(price*fee_rate/100);
  const adFee=Math.round(price*ad_rate/100);
  const net_profit=price-buyPrice-fee-adFee-shipping_fee;
  if(!price)return alert('販売価格を入力してください');
  await sbFetch('sales',{method:'POST',body:JSON.stringify({item_id:itemId,sell_price:price,sold_at:date,note,customer_id,fee_rate,ad_rate,shipping_fee,net_profit})});
  await sbFetch('items?id=eq.'+itemId,{method:'PATCH',body:JSON.stringify({status:'sold'})});
  await load();closeModal()
}

  const sourceOpts=SOURCE_TYPES.map(s=>'<option value="'+s.value+'">'+s.label+'</option>').join('');
  document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">仕入登録</div><label class="field-label">仕入先種別 *</label><select class="field-input" id="f-source-type">'+sourceOpts+'</select><label class="field-label">仕入先名</label><input class="field-input" id="f-source" placeholder="例: ○○フリマ"><label class="field-label">仕入日 *</label><input class="field-input" id="f-date" type="date" value="'+today()+'"><label class="field-label">合計仕入額(円) *</label><input class="field-input" id="f-total" type="number" placeholder="例: 15000" oninput="calcAvg()"><label class="field-label">仕入点数 *</label><input class="field-input" id="f-qty" type="number" placeholder="例: 5" oninput="calcAvg()"><input type="hidden" id="f-avg-hidden" value="0"><div class="calc-box"><div class="item-sub">自動計算</div><div class="calc-result" id="f-avg-result">1点あたりの平均仕入値: ¥0</div></div><label class="field-label">メモ</label><input class="field-input" id="f-note" placeholder="まとめ買いの内容など"><label class="field-label">写真（仕入れ全体）</label><div class="photo-upload" onclick="document.getElementById(\'purchase-photo\').click()">&#128247; タップして写真を選択</div><input type="file" id="purchase-photo" accept="image/*" style="display:none" onchange="previewPurchasePhoto(this)"><img id="purchase-photo-preview" class="photo-preview"><button class="p-save-btn" onclick="savePurchase(null)">登録する</button></div>';
  document.getElementById('modal').classList.add('show')
}

function openEditPurchase(id){
  const p=purchases.find(p=>p.id===id);if(!p)return;
  const sourceOpts=SOURCE_TYPES.map(s=>'<option value="'+s.value+'"'+(s.value===p.source_type?' selected':'')+'>'+s.label+'</option>').join('');
  document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">仕入編集</div>'+(p.photo_url?'<img src="'+esc(p.photo_url)+'" style="width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px">':'')+'<label class="field-label">仕入先種別 *</label><select class="field-input" id="f-source-type">'+sourceOpts+'</select><label class="field-label">仕入先名</label><input class="field-input" id="f-source" value="'+esc(p.source||'')+'"><label class="field-label">仕入日 *</label><input class="field-input" id="f-date" type="date" value="'+esc(p.purchase_date||today())+'"><label class="field-label">合計仕入額(円) *</label><input class="field-input" id="f-total" type="number" value="'+p.total_amount+'" oninput="calcAvg()"><label class="field-label">仕入点数 *</label><input class="field-input" id="f-qty" type="number" value="'+p.quantity+'" oninput="calcAvg()"><input type="hidden" id="f-avg-hidden" value="'+p.avg_amount+'"><div class="calc-box"><div class="item-sub">自動計算</div><div class="calc-result" id="f-avg-result">1点あたりの平均仕入値: '+fmt(p.avg_amount)+'</div></div><label class="field-label">メモ</label><input class="field-input" id="f-note" value="'+esc(p.note||'')+'"><label class="field-label">写真を変更</label><div class="photo-upload" onclick="document.getElementById(\'purchase-photo\').click()">&#128247; タップして写真を選択</div><input type="file" id="purchase-photo" accept="image/*" style="display:none" onchange="previewPurchasePhoto(this)"><img id="purchase-photo-preview" class="photo-preview"><button class="p-save-btn" onclick="savePurchase('+id+')">保存する</button></div>';
  document.getElementById('modal').classList.add('show')
}

async function savePurchase(id){
  const total=+document.getElementById('f-total').value;
  const qty=+document.getElementById('f-qty').value;
  if(!total||!qty)return alert('合計仕入額と仕入点数を入力してください');
  const avg=Math.round(total/qty);
  let photo_url=id?(purchases.find(p=>p.id===id)||{}).photo_url:null;
  const photoFile=document.getElementById('purchase-photo').files[0];
  if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}
  const row={source_type:document.getElementById('f-source-type').value,source:document.getElementById('f-source').value,purchase_date:document.getElementById('f-date').value,total_amount:total,quantity:qty,avg_amount:avg,note:document.getElementById('f-note').value,photo_url};
  if(id)await sbFetch('purchases?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});
  else await sbFetch('purchases',{method:'POST',body:JSON.stringify(row)});
  await loadPurchases();closeModal()
}

function openLinkItems(purchaseId){
  const p=purchases.find(p=>p.id===purchaseId);if(!p)return;
  document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">在庫に追加</div><div class="calc-box" style="margin-bottom:14px"><div class="item-sub">この仕入れから</div><div class="calc-result">平均仕入値 '+fmt(p.avg_amount)+'/点</div></div><label class="field-label">産地 *</label><input class="field-input" id="f-origin2" placeholder="例: 津軽" oninput="updateCode2()"><label class="field-label">管理コード（自動）</label><input class="field-input" id="f-code2" readonly style="background:#f0f0f0"><label class="field-label">名前 *</label><input class="field-input" id="f-name2" placeholder="例: 津軽こけし"><label class="field-label">種類</label><input class="field-input" id="f-type2" value="伝統工芸"><label class="field-label">仕入値(円)</label><input class="field-input" id="f-buy2" type="number" value="'+p.avg_amount+'"><label class="field-label">売値(円) *</label><input class="field-input" id="f-sell2" type="number" placeholder="例: 5000"><label class="field-label">メモ</label><input class="field-input" id="f-note2" placeholder="任意"><label class="field-label">写真</label><div class="photo-upload" onclick="document.getElementById(\'item-photo2\').click()">&#128247; タップして写真を選択</div><input type="file" id="item-photo2" accept="image/*" style="display:none" onchange="previewItemPhoto2(this)"><img id="item-photo-preview2" class="photo-preview"><button class="p-save-btn" onclick="addToInventory2('+purchaseId+')">在庫に追加する</button></div>';
  document.getElementById('modal').classList.add('show');
  updateCode2()
}

function updateCode2(){
  const origin=document.getElementById('f-origin2').value;
  const prefix=(origin||'').slice(0,2)||'??';
  const existing=items.filter(i=>(i.code||'').startsWith(prefix));
  const num=String(existing.length+1).padStart(3,'0');
  document.getElementById('f-code2').value=prefix+'-'+num
}

async function addToInventory2(purchaseId){
  const name=document.getElementById('f-name2').value;
  const origin=document.getElementById('f-origin2').value;
  const buy=+document.getElementById('f-buy2').value;
  const sell=+document.getElementById('f-sell2').value;
  if(!name||!origin||!buy||!sell)return alert('必須項目を入力してください');
  const code=document.getElementById('f-code2').value;
  const type=document.getElementById('f-type2').value;
  const note=document.getElementById('f-note2').value;
  let photo_url=null;
  const photoFile=document.getElementById('item-photo2').files[0];
  if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}
  const row={code,name,origin,type,buy_price:buy,sell_price:sell,note,photo_url,status:'in_stock'};
  const result=await sbFetch('items',{method:'POST',body:JSON.stringify(row)});
  if(result.ok&&result.data&&result.data[0]){
    await sbFetch('purchase_items',{method:'POST',body:JSON.stringify({purchase_id:purchaseId,item_id:result.data[0].id})})
  }
  await load();await loadPurchases();closeModal();alert('在庫に追加しました！')
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal').innerHTML=''
}

const urlParams=new URLSearchParams(location.search);
const scannedCode=urlParams.get('code');
load().then(()=>{
  if(scannedCode){
    const item=items.find(i=>i.code===scannedCode);
    if(item){showTab('items',document.querySelectorAll('.nav-btn')[1]);searchWord=scannedCode;renderItems()}
  }
});
</script>
</body>
