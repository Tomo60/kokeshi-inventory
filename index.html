<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Hiragino Sans','Yu Gothic',sans-serif}
body{background:#fdf6f0}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:70px}
.header{background:#6b2737;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}

.price-label{width:91mm;height:55mm;border:2px solid #6b2737;border-radius:4mm;padding:5mm;display:inline-flex;flex-direction:column;justify-content:space-between;background:#fff}

.purchase-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;display:flex;border-top:1px solid #d0e0d0;z-index:120}
.purchase-nav-btn{flex:1;border:none;background:none;padding:8px 0;cursor:pointer;color:#999;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-family:inherit}
.purchase-nav-btn.active{color:#2c5f2e}

.purchase-tab.active{display:block}

.p-add-btn{background:#2c5f2e;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.p-edit-btn{background:#e8f5e9;color:#2c5f2e;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.p-link-btn{background:#2980b9;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.p-save-btn{margin-top:18px;width:100%;background:#2c5f2e;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.p-kpi-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
</style>
</head>

<script>
const SB_URL="https://yjhhrqujmemlzghvvomx.supabase.co";
const SB_KEY="sb_publishable_utdf4r58eY6WQKMQbZ-2UA_rwUAQe2v";
let items=[],sales=[],customers=[],purchases=[],expenses=[],filterStatus='all',searchWord='';
const fmt=n=>'¥'+Number(n).toLocaleString();
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const SOURCE_TYPES=[{value:'mercari',label:'メルカリ'},{value:'yahoo',label:'ヤフオク'},{value:'rakuma',label:'ラクマ'},{value:'flea',label:'フリーマーケット'},{value:'antique',label:'骨董市'},{value:'shop',label:'骨董店'},{value:'other',label:'その他'}];
async function sbFetch(path,opts={}){const res=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=representation',...(opts.headers||{})}});const text=await res.text();let data;try{data=JSON.parse(text)}catch(e){data=text}return{data,ok:res.ok}}
async function uploadPhoto(file){const ext=file.name.split('.').pop();const path='kokeshi-'+Date.now()+'.'+ext;const res=await fetch(SB_URL+'/storage/v1/object/kokeshi-photos/'+path,{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':file.type},body:file});if(!res.ok)return null;return SB_URL+'/storage/v1/object/public/kokeshi-photos/'+path}
async function load(){const[ri,rs,rc,re]=await Promise.all([sbFetch('items?select=*&order=created_at.desc'),sbFetch('sales?select=*&order=sold_at.desc'),sbFetch('customers?select=*&order=created_at.desc'),sbFetch('expenses?select=*&order=expense_date.desc')]);items=Array.isArray(ri.data)?ri.data:[];sales=Array.isArray(rs.data)?rs.data:[];customers=Array.isArray(rc.data)?rc.data:[];expenses=Array.isArray(re.data)?re.data:[];renderAll()}
function renderAll(){renderDashboard();renderItems();renderSales();renderExpenses();renderCustomers()}
function kpi(l,v,c){return '<div class="kpi-card" style="border-top:3px solid '+c+'"><div class="kpi-label">'+l+'</div><div class="kpi-value" style="color:'+c+'">'+v+'</div></div>'}
function renderDashboard(){const inStock=items.filter(i=>i.status==='in_stock');const soldItems=items.filter(i=>i.status==='sold');const totalSell=sales.reduce((s,s2)=>s+(s2.sell_price||0),0);const totalNet=sales.reduce((s,s2)=>s+(s2.net_profit!=null?s2.net_profit:(s2.sell_price||0)-(items.find(i=>i.id===s2.item_id)||{}).buy_price||0),0);const totalExp=expenses.reduce((s,e)=>s+(e.amount||0),0);const realProfit=totalNet-totalExp;let h='<h2 class="section-title">サマリー</h2><div class="card-grid">'+kpi('在庫数',inStock.length+'点','#c0392b')+kpi('売済数',soldItems.length+'点','#27ae60')+kpi('売上合計',fmt(totalSell),'#2980b9')+kpi('純利合計',fmt(totalNet),totalNet>=0?'#8e44ad':'#e74c3c')+kpi('経費合計',fmt(totalExp),'#e67e22')+kpi('実質利益',fmt(realProfit),realProfit>=0?'#1e8449':'#e74c3c')+'</div>';h+='<button onclick="openPurchase()" style="width:100%;background:#2c5f2e;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;margin-bottom:4px;font-family:inherit">&#128230; 仕入帳を開く</button>';h+='<h2 class="section-title">最近登録したこけし</h2>';h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="add-btn" style="background:#27ae60;flex:1" onclick="exportCSV(\'items\')">&#128229; 在庫CSV</button><button class="add-btn" style="background:#2980b9;flex:1" onclick="exportCSV(\'sales\')">&#128229; 販売記録CSV</button></div>';items.slice(0,5).forEach(i=>{h+=itemCard(i,true)});h+='<div id="graph-area"></div>';document.getElementById('tab-dashboard').innerHTML=h;setTimeout(function(){renderGraph()},100);}
function exportCSV(type){let csv,filename;if(type==='items'){csv='管理コード,名前,産地,種類,仕入値,売値,送料,ステータス,メモ,登録日\n';items.forEach(function(i){csv+=[i.code,i.name,i.origin,i.type,i.buy_price,i.sell_price,i.shipping_fee||0,i.status==='in_stock'?'在庫中':'売済み',i.note||'',(i.created_at||'').slice(0,10)].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"'}).join(',')+'\n'});filename='kokeshi-inventory-'+today()+'.csv';}else{csv='管理コード,こけし名,顧客名,販売価格,仕入値,手数料率,広告費率,手数料,広告費,送料,純利益,販売日,メモ\n';sales.forEach(function(s){const item=items.find(function(i){return i.id===s.item_id})||{};const customer=customers.find(function(c){return c.id===s.customer_id})||{};const fee=Math.round((s.sell_price||0)*(s.fee_rate||0)/100);const adFee=Math.round((s.sell_price||0)*(s.ad_rate||0)/100);csv+=[item.code||'',item.name||s.note||'不明',customer.name||'',s.sell_price,item.buy_price||0,s.fee_rate||0,s.ad_rate||0,fee,adFee,s.shipping_fee||0,s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0),s.sold_at||'',s.note||''].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"'}).join(',')+'\n'});filename='kokeshi-sales-'+today()+'.csv';}const encoded=encodeURIComponent('\uFEFF'+csv);const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encoded;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a)}
function renderGraph(){const monthlyData={};sales.forEach(function(s){const month=(s.sold_at||'').slice(0,7);if(!month)return;if(!monthlyData[month])monthlyData[month]={revenue:0,net:0};monthlyData[month].revenue+=s.sell_price||0;const item=items.find(function(i){return i.id===s.item_id})||{};monthlyData[month].net+=s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0)});const months=Object.keys(monthlyData).sort().slice(-6);const revenues=months.map(function(m){return monthlyData[m].revenue});const nets=months.map(function(m){return monthlyData[m].net});const labels=months.map(function(m){return m.replace('-','/')});const el=document.getElementById('graph-area');if(!el)return;if(!sales.length){el.innerHTML='';return}let h='<h2 class="section-title">売上グラフ（直近6ヶ月）</h2>';h+='<div class="card"><canvas id="revenue-chart"></canvas></div>';h+='<div class="card"><canvas id="profit-chart"></canvas></div>';el.innerHTML=h;new Chart(document.getElementById('revenue-chart'),{type:'bar',data:{labels:labels,datasets:[{label:'売上',data:revenues,backgroundColor:'#2980b9'}]},options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:'月別売上'}}}});new Chart(document.getElementById('profit-chart'),{type:'bar',data:{labels:labels,datasets:[{label:'純利益',data:nets,backgroundColor:nets.map(function(p){return p>=0?'#27ae60':'#e74c3c'})}]},options:{responsive:true,plugins:{legend:{display:false},title:{display:true,text:'月別純利益'}}}})}
function itemCard(item,compact){const sold=item.status==='sold';let h='<div class="card" style="padding:10px 12px">';h+='<div style="display:flex;gap:10px;align-items:flex-start">';if(item.photo_url){h+='<img src="'+esc(item.photo_url)+'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0" onerror="this.style.display=\'none\'">';}else{h+='<div onclick="openPhotoOnly('+item.id+')" style="width:60px;height:60px;border-radius:8px;background:#f5f0eb;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:1px dashed #ddd"><span style="font-size:20px">📷</span><span style="font-size:9px;color:#aaa;margin-top:2px">写真追加</span></div>';}h+='<div style="flex:1;min-width:0">';h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span class="status-badge '+(sold?'status-sold':'status-in')+'">'+(sold?'売済み':'在庫中')+'</span>'+(item.code?'<span class="code-badge">'+esc(item.code)+'</span>':'')+'</div>';h+='<div style="font-size:13px;font-weight:700;color:#2c1010;line-height:1.4;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(item.name)+'</div>';h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';if(item.sell_price)h+='<span class="price-tag">売値 '+fmt(item.sell_price)+'</span>';if(item.buy_price)h+='<span class="price-tag">仕入 '+fmt(item.buy_price)+'</span>';h+='</div>';h+='</div></div>';if(!compact){h+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">';h+='<button class="edit-btn" onclick="openEditItem('+item.id+')" style="flex:1">編集</button>';h+='<button style="background:#f5f0eb;color:#6b2737;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit" onclick="openPhotoOnly('+item.id+')">📷</button>';h+='<button class="qr-btn" onclick="showQR('+item.id+')" style="padding:4px 10px">QR</button>';if(!sold)h+='<button class="sold-btn" onclick="openSell('+item.id+')" style="flex:1">販売</button>';if(sold)h+='<button class="return-btn" onclick="returnToStock('+item.id+')" style="flex:1">在庫に戻す</button>';h+='</div>';}h+='</div>';return h}
function openPhotoOnly(id){const item=items.find(i=>i.id===id);if(!item)return;document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">📷 写真を追加・変更</div><div style="font-size:13px;color:#555;margin-bottom:12px;font-weight:700">'+esc(item.name)+'</div>'+(item.photo_url?'<img src="'+esc(item.photo_url)+'" style="width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px">':'')+'<div class="photo-upload" onclick="document.getElementById(\'f-photo-only\').click()">&#128247; タップして写真を選択</div><input type="file" id="f-photo-only" accept="image/*" capture="environment" style="display:none" onchange="previewPhotoOnly(this)"><img id="photo-only-preview" class="photo-preview"><button class="save-btn" id="photo-only-save-btn" style="display:none" onclick="savePhotoOnly('+id+')">写真を保存する</button></div>';document.getElementById('modal').classList.add('show')}
function previewPhotoOnly(input){if(input.files&&input.files[0]){const reader=new FileReader();reader.onload=e=>{const img=document.getElementById('photo-only-preview');img.src=e.target.result;img.style.display='block';document.getElementById('photo-only-save-btn').style.display='block'};reader.readAsDataURL(input.files[0])}}
async function savePhotoOnly(id){const photoFile=document.getElementById('f-photo-only').files[0];if(!photoFile)return alert('写真を選択してください');const url=await uploadPhoto(photoFile);if(!url)return alert('写真のアップロードに失敗しました');await sbFetch('items?id=eq.'+id,{method:'PATCH',body:JSON.stringify({photo_url:url})});await load();closeModal()}
function renderItems(){const filtered=items.filter(i=>{if(filterStatus==='in_stock'&&i.status!=='in_stock')return false;if(filterStatus==='sold'&&i.status!=='sold')return false;if(searchWord&&!((i.name||'').toLowerCase().includes(searchWord.toLowerCase())||(i.code||'').toLowerCase().includes(searchWord.toLowerCase())||(i.origin||'').includes(searchWord)))return false;return true});const inCount=items.filter(i=>i.status==='in_stock').length;const soldCount=items.filter(i=>i.status==='sold').length;let h='<div class="row-between"><h2 class="section-title">在庫一覧 ('+filtered.length+'件)</h2><button class="add-btn" onclick="openAddItem()">+ 登録</button></div>';h+='<div style="position:relative;margin-bottom:8px"><input class="search-input" style="margin-bottom:0;padding-right:32px" placeholder="🔍 名前・コードで検索" oninput="searchWord=this.value;renderItems()" value="'+esc(searchWord)+'">'+(searchWord?'<button onclick="searchWord=\'\';renderItems()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;color:#aaa;line-height:1">✕</button>':'')+'</div>';h+='<div class="filter-row"><button class="filter-btn'+(filterStatus==='all'?' active':'')+'" onclick="filterStatus=\'all\';renderItems()">すべて('+items.length+')</button><button class="filter-btn'+(filterStatus==='in_stock'?' active':'')+'" onclick="filterStatus=\'in_stock\';renderItems()">在庫中('+inCount+')</button><button class="filter-btn'+(filterStatus==='sold'?' active':'')+'" onclick="filterStatus=\'sold\';renderItems()">売済み('+soldCount+')</button></div>';if(!filtered.length)h+='<div class="empty">該当するこけしがありません</div>';filtered.forEach(item=>{h+=itemCard(item,false)});document.getElementById('tab-items').innerHTML=h}
function renderSales(){let h='<div class="row-between"><h2 class="section-title">販売記録</h2><button class="add-btn" style="background:#e74c3c" onclick="openMercariImport()">&#128203; メルカリ取込</button></div>';if(!sales.length)h+='<div class="empty">販売記録がありません</div>';sales.forEach(s=>{const item=items.find(i=>i.id===s.item_id)||{};const customer=customers.find(c=>c.id===s.customer_id)||{};const net=s.net_profit!=null?s.net_profit:(s.sell_price||0)-(item.buy_price||0);h+='<div class="card"><div class="row-between"><span class="code-badge">'+esc(item.code||'メルカリ')+'</span><span class="item-sub">'+esc(s.sold_at)+'</span></div><div class="item-name">'+esc(item.name||s.note||'不明')+'</div>'+(customer.name?'<div class="item-sub">&#128100; '+esc(customer.name)+'</div>':'')+'<div class="price-row"><span class="price-tag">販売 '+fmt(s.sell_price)+'</span>'+(s.fee_rate?'<span class="price-tag">手数料'+s.fee_rate+'%</span>':'')+(s.ad_rate?'<span class="price-tag">広告'+s.ad_rate+'%</span>':'')+(s.shipping_fee?'<span class="price-tag">送料 '+fmt(s.shipping_fee)+'</span>':'')+'<span class="price-tag" style="color:'+(net>=0?'#27ae60':'#e74c3c')+';font-weight:700">純利 '+fmt(net)+'</span></div>'+(s.note&&!item.id?'<div class="item-sub">'+esc(s.note)+'</div>':'')+'</div>'});document.getElementById('tab-sales').innerHTML=h}
function renderCustomers(){let h='<div class="row-between"><h2 class="section-title">顧客一覧</h2><button class="add-btn" onclick="openAddCustomer()">+ 追加</button></div>';if(!customers.length){h+='<div class="empty">顧客を登録してください</div>';document.getElementById('tab-customers').innerHTML=h;return}customers.forEach(function(c){const cSales=sales.filter(function(s){return s.customer_id===c.id});const total=cSales.reduce(function(s,t){return s+(t.sell_price||0)},0);h+='<div class="card"><div class="row-between"><div><div class="item-name">'+esc(c.name)+'</div><div class="item-sub">'+esc(c.contact||'')+'</div></div><button class="edit-btn" onclick="openEditCustomer('+c.id+')">編集</button></div>';h+='<div class="price-row"><span class="price-tag">購入回数: '+cSales.length+'回</span><span class="price-tag">累計: '+fmt(total)+'</span></div>';if(c.note)h+='<div class="item-sub" style="margin-top:4px">📝 '+esc(c.note)+'</div>';if(cSales.length){h+='<div style="margin-top:8px"><div class="item-sub" style="margin-bottom:4px">購入履歴:</div>';cSales.slice(0,3).forEach(function(s){const item=items.find(function(i){return i.id===s.item_id})||{};h+='<div class="item-sub">・'+esc(item.name||'不明')+' '+fmt(s.sell_price)+' ('+esc(s.sold_at)+')</div>'});if(cSales.length>3)h+='<div class="item-sub">他 '+(cSales.length-3)+'件...</div>';h+='</div>';}h+='</div>'});document.getElementById('tab-customers').innerHTML=h}
function showTab(tab,btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');document.querySelectorAll('#app .tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active')}
function showQR(id){const item=items.find(i=>i.id===id);if(!item)return;const url=location.origin+'?code='+encodeURIComponent(item.code);document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">QRコード / 値札</div><div class="qr-container"><div id="qr-canvas"></div><div class="qr-label">'+esc(item.code)+'<br>'+esc(item.name)+'</div></div><button class="print-btn" style="margin-top:14px;width:100%" onclick="printLabel('+id+')">&#128438; 値札を印刷</button></div>';document.getElementById('modal').classList.add('show');setTimeout(function(){new QRCode(document.getElementById('qr-canvas'),{text:url,width:180,height:180,colorDark:'#6b2737',colorLight:'#ffffff'})},100)}
function printLabel(id){const item=items.find(i=>i.id===id);if(!item)return;const url=location.origin+'?code='+encodeURIComponent(item.code);const pa=document.getElementById('print-area');pa.innerHTML='<div class="price-label"><div><div class="price-label-name">'+esc(item.name)+'</div><div class="price-label-origin">産地: '+esc(item.origin)+'</div></div><div class="price-label-bottom"><div><div class="price-label-price">'+fmt(item.sell_price)+'</div><div class="price-label-code">'+esc(item.code)+'</div></div><div id="label-qr"></div></div></div>';pa.style.display='block';setTimeout(function(){new QRCode(document.getElementById('label-qr'),{text:url,width:75,height:75,colorDark:'#6b2737',colorLight:'#ffffff'});setTimeout(function(){window.print();pa.style.display='none'},400)},100)}
function updateCode(){const origin=document.getElementById('f-origin').value;const prefix=(origin||'').slice(0,2)||'??';const existing=items.filter(i=>(i.code||'').startsWith(prefix));const num=String(existing.length+1).padStart(3,'0');document.getElementById('f-code').value=prefix+'-'+num}
function previewPhoto(input){if(input.files&&input.files[0]){const reader=new FileReader();reader.onload=e=>{const img=document.getElementById('photo-preview');img.src=e.target.result;img.style.display='block'};reader.readAsDataURL(input.files[0])}}
function openAddItem(){document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">こけし登録</div><label class="field-label">産地 *</label><input class="field-input" id="f-origin" placeholder="例: 津軽" oninput="updateCode()"><label class="field-label">管理コード（自動）</label><input class="field-input" id="f-code" readonly style="background:#f0f0f0"><label class="field-label">名前 *</label><input class="field-input" id="f-name" placeholder="例: 津軽こけし"><label class="field-label">種類</label><input class="field-input" id="f-type" value="伝統工芸"><label class="field-label">仕入値(円) *</label><input class="field-input" id="f-buy" type="number" placeholder="例: 3000"><label class="field-label">売値(円) *</label><input class="field-input" id="f-sell" type="number" placeholder="例: 5000"><label class="field-label">送料(円)</label><input class="field-input" id="f-shipping" type="number" value="0" placeholder="例: 600"><label class="field-label">メモ</label><input class="field-input" id="f-note" placeholder="任意"><label class="field-label">出品サイト</label><select class="field-input" id="f-site"><option value="">なし</option><option value="メルカリ">メルカリ</option><option value="ヤフオク">ヤフオク</option><option value="ラクマ">ラクマ</option><option value="その他">その他</option></select><label class="field-label">出品URL</label><input class="field-input" id="f-url" placeholder="https://..."><label class="field-label">写真</label><div class="photo-upload" onclick="document.getElementById(\'f-photo\').click()">&#128247; タップして写真を選択</div><input type="file" id="f-photo" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)"><img id="photo-preview" class="photo-preview"><button class="save-btn" onclick="saveItem(null)">登録する</button></div>';document.getElementById('modal').classList.add('show');updateCode()}
function openEditItem(id){const item=items.find(i=>i.id===id);if(!item)return;document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">こけし編集</div>'+(item.photo_url?'<img src="'+esc(item.photo_url)+'" style="width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px">':'')+'<label class="field-label">名前 *</label><input class="field-input" id="f-name" value="'+esc(item.name)+'"><label class="field-label">産地</label><input class="field-input" id="f-origin" value="'+esc(item.origin||'')+'"><label class="field-label">仕入値(円)</label><input class="field-input" id="f-buy" type="number" value="'+(item.buy_price||0)+'"><label class="field-label">売値(円)</label><input class="field-input" id="f-sell" type="number" value="'+(item.sell_price||0)+'"><label class="field-label">送料(円)</label><input class="field-input" id="f-shipping" type="number" value="'+(item.shipping_fee||0)+'"><label class="field-label">出品サイト</label><select class="field-input" id="f-site"><option value="">なし</option><option value="メルカリ"'+(item.listing_site==="メルカリ"?' selected':'')+'>メルカリ</option><option value="ヤフオク"'+(item.listing_site==="ヤフオク"?' selected':'')+'>ヤフオク</option><option value="ラクマ"'+(item.listing_site==="ラクマ"?' selected':'')+'>ラクマ</option><option value="その他"'+(item.listing_site==="その他"?' selected':'')+'>その他</option></select><label class="field-label">出品URL</label><input class="field-input" id="f-url" value="'+esc(item.listing_url||'')+'" placeholder="https://..."><label class="field-label">メモ</label><input class="field-input" id="f-note" value="'+esc(item.note||'')+'" placeholder="任意"><input type="hidden" id="f-code" value="'+esc(item.code||'')+'"><input type="hidden" id="f-type" value="'+esc(item.type||'創作こけし')+'"><label class="field-label">写真を変更</label><div class="photo-upload" onclick="document.getElementById(\'f-photo\').click()">&#128247; タップして写真を選択</div><input type="file" id="f-photo" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)"><img id="photo-preview" class="photo-preview"><button class="save-btn" onclick="saveItem('+id+')">保存する</button></div>';document.getElementById('modal').classList.add('show')}
function saveItem(id){const name=document.getElementById('f-name').value;const origin=document.getElementById('f-origin').value;const buy=+document.getElementById('f-buy').value;const sell=+document.getElementById('f-sell').value;if(!name||!origin||!buy||!sell)return alert('必須項目を入力してください');const code=document.getElementById('f-code').value;const type=document.getElementById('f-type').value;const note=document.getElementById('f-note').value;const shipping_fee=+document.getElementById('f-shipping').value||0;const listing_site=document.getElementById('f-site')?document.getElementById('f-site').value:'';const listing_url=document.getElementById('f-url')?document.getElementById('f-url').value:'';let photo_url=id?(items.find(i=>i.id===id)||{}).photo_url:null;const photoFile=document.getElementById('f-photo').files[0];if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}const row={code,name,origin,type,buy_price:buy,sell_price:sell,note,photo_url,listing_site,listing_url,shipping_fee};if(id)await sbFetch('items?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});else await sbFetch('items',{method:'POST',body:JSON.stringify(row)});await load();closeModal()}
function calcNetProfit(){const price=+document.getElementById('f-sprice').value||0;const rate=+document.getElementById('f-fee-rate').value||0;const adRate=+document.getElementById('f-ad-rate').value||0;const ship=+document.getElementById('f-ship').value||0;const buyPrice=+document.getElementById('f-buy-hidden').value||0;const fee=Math.round(price*rate/100);const adFee=Math.round(price*adRate/100);const net=price-buyPrice-fee-adFee-ship;document.getElementById('f-fee-calc').textContent='手数料: ¥'+fee.toLocaleString()+' / 広告費: ¥'+adFee.toLocaleString();document.getElementById('f-net-calc').textContent='純利益: ¥'+net.toLocaleString();document.getElementById('f-net-calc').style.color=net>=0?'#27ae60':'#e74c3c'}
function openSell(id){const item=items.find(i=>i.id===id);if(!item)return;const site=item.listing_site||'';const defaultRate=site==='メルカリ'?10:site==='ヤフオク'?10:site==='ラクマ'?6:0;const defaultAd=site==='メルカリ'?5:0;const defaultShip=item.shipping_fee||0;document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">販売登録</div><div class="card" style="margin-bottom:14px"><div class="item-name">'+esc(item.name)+'</div><div class="item-sub">'+esc(item.code)+(site?' / '+esc(site):'')+'</div></div><input type="hidden" id="f-buy-hidden" value="'+item.buy_price+'"><label class="field-label">販売価格(円)</label><input class="field-input" id="f-sprice" type="number" value="'+item.sell_price+'" oninput="calcNetProfit()"><label class="field-label">販売手数料率(%)</label><input class="field-input" id="f-fee-rate" type="number" value="'+defaultRate+'" oninput="calcNetProfit()"><label class="field-label">広告費率(%)</label><input class="field-input" id="f-ad-rate" type="number" value="'+defaultAd+'" oninput="calcNetProfit()"><label class="field-label">送料(円)</label><input class="field-input" id="f-ship" type="number" value="'+defaultShip+'" oninput="calcNetProfit()"><div style="background:#f5f0eb;border-radius:8px;padding:10px;margin-top:12px"><div id="f-fee-calc" style="font-size:13px;color:#888;margin-bottom:4px">手数料: ¥0 / 広告費: ¥0</div><div id="f-net-calc" style="font-size:16px;font-weight:700;color:#27ae60">純利益: ¥0</div></div><label class="field-label">販売日</label><input class="field-input" id="f-sdate" type="date" value="'+today()+'"><label class="field-label">顧客</label><select class="field-input" id="f-customer"><option value="">選択しない</option>'+customers.map(function(c){return'<option value="'+c.id+'">'+esc(c.name)+'</option>'}).join('')+'</select><label class="field-label">メモ</label><input class="field-input" id="f-snote" placeholder="任意"><button class="save-btn" style="background:#27ae60" onclick="saveSell('+id+')">販売確定</button></div>';document.getElementById('modal').classList.add('show');calcNetProfit()}
async function saveSell(itemId){const price=+document.getElementById('f-sprice').value;const date=document.getElementById('f-sdate').value;const note=document.getElementById('f-snote').value;const fee_rate=+document.getElementById('f-fee-rate').value||0;const ad_rate=+document.getElementById('f-ad-rate').value||0;const shipping_fee=+document.getElementById('f-ship').value||0;const customer_id=document.getElementById('f-customer')?+document.getElementById('f-customer').value||null:null;const buyPrice=+document.getElementById('f-buy-hidden').value||0;const fee=Math.round(price*fee_rate/100);const adFee=Math.round(price*ad_rate/100);const net_profit=price-buyPrice-fee-adFee-shipping_fee;if(!price)return alert('販売価格を入力してください');await sbFetch('sales',{method:'POST',body:JSON.stringify({item_id:itemId,sell_price:price,sold_at:date,note,customer_id,fee_rate,ad_rate,shipping_fee,net_profit})});await sbFetch('items?id=eq.'+itemId,{method:'PATCH',body:JSON.stringify({status:'sold'})});await load();closeModal()}
function openAddCustomer(){document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">顧客追加</div><label class="field-label">名前 *</label><input class="field-input" id="f-cname" placeholder="例: 山田太郎"><label class="field-label">連絡先</label><input class="field-input" id="f-ccontact" placeholder="電話番号・メール等"><label class="field-label">メモ</label><input class="field-input" id="f-cnote" placeholder="好みのこけし等"><button class="save-btn" onclick="saveCustomer(null)">登録する</button></div>';document.getElementById('modal').classList.add('show')}
function openEditCustomer(id){const c=customers.find(function(c){return c.id===id});if(!c)return;document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">顧客編集</div><label class="field-label">名前 *</label><input class="field-input" id="f-cname" value="'+esc(c.name)+'"><label class="field-label">連絡先</label><input class="field-input" id="f-ccontact" value="'+esc(c.contact||'')+'"><label class="field-label">メモ</label><input class="field-input" id="f-cnote" value="'+esc(c.note||'')+'"><button class="save-btn" onclick="saveCustomer('+id+')">保存する</button></div>';document.getElementById('modal').classList.add('show')}
async function saveCustomer(id){const name=document.getElementById('f-cname').value;if(!name)return alert('名前を入力してください');const row={name,contact:document.getElementById('f-ccontact').value,note:document.getElementById('f-cnote').value};if(id)await sbFetch('customers?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});else await sbFetch('customers',{method:'POST',body:JSON.stringify(row)});await load();closeModal()}

function renderPurchaseDashboard(){const totalAmount=purchases.reduce((s,p)=>s+(p.total_amount||0),0);const totalQty=purchases.reduce((s,p)=>s+(p.quantity||0),0);const avgAmount=totalQty>0?Math.round(totalAmount/totalQty):0;let h='<h2 class="section-title">仕入サマリー</h2><div class="card-grid">'+pkpi('総仕入額',fmt(totalAmount),'#2c5f2e')+pkpi('総仕入点数',totalQty+'点','#2980b9')+pkpi('仕入回数',purchases.length+'回','#8e44ad')+pkpi('平均仕入値',fmt(avgAmount),'#e67e22')+'</div>';h+='<h2 class="section-title">最近の仕入れ</h2>';if(!purchases.length)h+='<div class="empty">仕入れを登録してください</div>';purchases.slice(0,5).forEach(p=>{h+=purchaseCard(p,true)});document.getElementById('purchase-tab-dashboard').innerHTML=h}

async function savePurchase(id){const total=+document.getElementById('f-total').value;const qty=+document.getElementById('f-qty').value;if(!total||!qty)return alert('合計仕入額と仕入点数を入力してください');const avg=Math.round(total/qty);let photo_url=id?(purchases.find(p=>p.id===id)||{}).photo_url:null;const photoFile=document.getElementById('purchase-photo').files[0];if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}const row={source_type:document.getElementById('f-source-type').value,source:document.getElementById('f-source').value,purchase_date:document.getElementById('f-date').value,total_amount:total,quantity:qty,avg_amount:avg,note:document.getElementById('f-note').value,photo_url};if(id)await sbFetch('purchases?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});else await sbFetch('purchases',{method:'POST',body:JSON.stringify(row)});await loadPurchases();closeModal()}
function openLinkItems(purchaseId){const p=purchases.find(p=>p.id===purchaseId);if(!p)return;document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">在庫に追加</div><div class="calc-box" style="margin-bottom:14px"><div class="item-sub">この仕入れから</div><div class="calc-result">平均仕入値 '+fmt(p.avg_amount)+'/点</div></div><label class="field-label">産地 *</label><input class="field-input" id="f-origin2" placeholder="例: 津軽" oninput="updateCode2()"><label class="field-label">管理コード（自動）</label><input class="field-input" id="f-code2" readonly style="background:#f0f0f0"><label class="field-label">名前 *</label><input class="field-input" id="f-name2" placeholder="例: 津軽こけし"><label class="field-label">種類</label><input class="field-input" id="f-type2" value="伝統工芸"><label class="field-label">仕入値(円)</label><input class="field-input" id="f-buy2" type="number" value="'+p.avg_amount+'"><label class="field-label">売値(円) *</label><input class="field-input" id="f-sell2" type="number" placeholder="例: 5000"><label class="field-label">メモ</label><input class="field-input" id="f-note2" placeholder="任意"><label class="field-label">写真</label><div class="photo-upload" onclick="document.getElementById(\'item-photo2\').click()">&#128247; タップして写真を選択</div><input type="file" id="item-photo2" accept="image/*" capture="environment" style="display:none" onchange="previewItemPhoto2(this)"><img id="item-photo-preview2" class="photo-preview"><button class="p-save-btn" onclick="addToInventory2('+purchaseId+')">在庫に追加する</button></div>';document.getElementById('modal').classList.add('show');updateCode2()}
function updateCode2(){const origin=document.getElementById('f-origin2').value;const prefix=(origin||'').slice(0,2)||'??';const existing=items.filter(i=>(i.code||'').startsWith(prefix));const num=String(existing.length+1).padStart(3,'0');document.getElementById('f-code2').value=prefix+'-'+num}
async function addToInventory2(purchaseId){const name=document.getElementById('f-name2').value;const origin=document.getElementById('f-origin2').value;const buy=+document.getElementById('f-buy2').value;const sell=+document.getElementById('f-sell2').value;if(!name||!origin||!buy||!sell)return alert('必須項目を入力してください');const code=document.getElementById('f-code2').value;const type=document.getElementById('f-type2').value;const note=document.getElementById('f-note2').value;let photo_url=null;const photoFile=document.getElementById('item-photo2').files[0];if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}const row={code,name,origin,type,buy_price:buy,sell_price:sell,note,photo_url,status:'in_stock'};const result=await sbFetch('items',{method:'POST',body:JSON.stringify(row)});if(result.ok&&result.data&&result.data[0]){await sbFetch('purchase_items',{method:'POST',body:JSON.stringify({purchase_id:purchaseId,item_id:result.data[0].id})})}await load();await loadPurchases();closeModal();alert('在庫に追加しました！')}
function parseMercariItems(text){const results=[];const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);for(let i=0;i<lines.length;i++){const l=lines[i];if(!l.includes('のサムネイル'))continue;const sold=lines[i+1]==='SOLD';let title='';let price=0;for(let j=i+1;j<Math.min(i+8,lines.length);j++){const lj=lines[j];if(lj==='SOLD'||lj.includes('サムネイル')||lj.includes('購入')||lj.includes('メニュー')||lj.includes('入札')||lj.includes('undefined')||lj.includes('売り切れ'))continue;if(!title&&lj.length>3&&!/^[¥\d,\s現在]+$/.test(lj)&&!lj.match(/^\d+\/\d+/)){title=lj;continue}if(!price){const nm=lj.replace(/[¥,\s]/g,'').match(/^(\d{3,6})$/);if(nm)price=parseInt(nm[1])}}if(title&&price)results.push({name:title,sell_price:price,status:sold?'sold':'in_stock',origin:'不明',type:'創作こけし',buy_price:0})}return results}
function openMercariItemImport(){document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">&#128230; メルカリ在庫一括取込</div><div style="background:#fdf6f0;border-radius:8px;padding:10px 12px;margin-bottom:12px;border:1px solid #e8d5c0"><div style="font-size:12px;color:#6b2737;margin-bottom:4px">① メルカリPC版 → 出品した商品 を開く</div><div style="font-size:12px;color:#6b2737;margin-bottom:4px">② Ctrl+A（全選択）→ Ctrl+C（コピー）</div><div style="font-size:12px;color:#6b2737">③ 下のテキストエリアに貼り付け</div></div><div style="font-size:12px;color:#888;margin-bottom:8px">※ SOLDは「売済み」、それ以外は「在庫中」で登録。仕入値は0円（後で編集可）。</div><label class="field-label">商品一覧テキストを貼り付け</label><textarea class="field-input" id="f-mercari-items" rows="8" style="resize:vertical;line-height:1.5" placeholder="ここにメルカリの商品一覧テキストを貼り付けてください…"></textarea><button class="save-btn" onclick="previewMercariItems()">データを読み取る</button></div>';document.getElementById('modal').classList.add('show')}
function previewMercariItems(){const text=document.getElementById('f-mercari-items').value;const results=parseMercariItems(text);if(!results.length)return alert('データを読み取れませんでした。メルカリの商品一覧ページをコピーして貼り付けてください。');window._mercariItems=results;const soldCount=results.filter(r=>r.status==='sold').length;const inCount=results.filter(r=>r.status==='in_stock').length;let h='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">&#128230; 取込確認</div><div style="font-size:13px;color:#27ae60;font-weight:700;margin-bottom:4px">✅ '+results.length+'件を読み取りました</div><div style="font-size:12px;color:#888;margin-bottom:12px">在庫中: '+inCount+'件 / 売済み: '+soldCount+'件</div><div style="max-height:300px;overflow-y:auto;margin-bottom:12px">';results.forEach(r=>{h+='<div style="background:#fafafa;border-radius:8px;padding:8px 12px;margin-bottom:6px;border:1px solid #eee;display:flex;justify-content:space-between;align-items:center"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:#2c1010;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(r.name)+'</div><div style="font-size:12px;color:#888">売値 '+fmt(r.sell_price)+'</div></div><span style="margin-left:8px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;background:'+(r.status==='sold'?'#f5f5f5':'#eafaf1')+';color:'+(r.status==='sold'?'#999':'#1e8449')+'">'+(r.status==='sold'?'売済み':'在庫中')+'</span></div>'});h+='</div><div style="display:flex;gap:8px"><button class="save-btn" style="background:#aaa;flex:1;margin-top:0" onclick="openMercariItemImport()">やり直す</button><button class="save-btn" style="flex:2;margin-top:0" onclick="saveMercariItems()">取込む</button></div></div>';document.getElementById('modal').innerHTML=h;document.getElementById('modal').classList.add('show')}
async function saveMercariItems(){const results=window._mercariItems||[];if(!results.length)return;let count=0;for(let idx=0;idx<results.length;idx++){const row=results[idx];const code='不明-'+String(idx+1).padStart(3,'0');const res=await sbFetch('items',{method:'POST',body:JSON.stringify({name:row.name,origin:row.origin,type:row.type,buy_price:row.buy_price,sell_price:row.sell_price,status:row.status,code,note:'メルカリから取込'})});if(res.ok)count++}await load();closeModal();alert(count+'件を取込みました！')}
function parseMercariText(text){const results=[];const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);let i=0;while(i<lines.length){const dateMatch=lines[i].match(/^(\d{4}\/\d{2}\/\d{2})$/);if(dateMatch){const soldDate=dateMatch[1].replace(/\//g,'-');let title='';let sellPrice=0,fee=0,shippingFee=0,netProfit=0;for(let j=i-1;j>=Math.max(0,i-10);j--){const l=lines[j];if(l.includes('サムネイル'))continue;if(/^[\d,¥%\-]+$/.test(l))continue;if(l==='---')continue;if(/^\d+%$/.test(l))continue;if(l.length>5&&!l.match(/^[¥\d,]+$/)){title=l;break}}const nums=[];for(let j=Math.max(0,i-15);j<i;j++){const l=lines[j];const nm=l.replace(/[¥,]/g,'').match(/^(\d+)$/);if(nm)nums.push(parseInt(nm[1]))}if(nums.length>=4){sellPrice=nums[nums.length-4];fee=nums[nums.length-3];shippingFee=nums[nums.length-2];netProfit=nums[nums.length-1]}else if(nums.length>=1){netProfit=nums[nums.length-1]}if(title&&soldDate)results.push({title,sell_price:sellPrice,fee,shipping_fee:shippingFee,net_profit:netProfit,sold_at:soldDate})}i++}return results}
function openMercariImport(){document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">&#128203; メルカリ売上取込</div><div style="background:#fdf6f0;border-radius:8px;padding:10px 12px;margin-bottom:12px;border:1px solid #e8d5c0"><div style="font-size:12px;color:#6b2737;margin-bottom:4px">① メルカリ → マイページ → 販売履歴を開く</div><div style="font-size:12px;color:#6b2737;margin-bottom:4px">② 画面全体を長押し → 全選択 → コピー</div><div style="font-size:12px;color:#6b2737">③ 下のテキストエリアに貼り付け</div></div><label class="field-label">販売履歴テキストを貼り付け</label><textarea class="field-input" id="f-mercari-text" rows="8" style="resize:vertical;line-height:1.5" placeholder="ここにメルカリの販売履歴テキストを貼り付けてください…"></textarea><button class="save-btn" onclick="previewMercari()">データを読み取る</button></div>';document.getElementById('modal').classList.add('show')}
function previewMercari(){const text=document.getElementById('f-mercari-text').value;const results=parseMercariText(text);if(!results.length)return alert('データを読み取れませんでした。メルカリの販売履歴ページをコピーして貼り付けてください。');window._mercariParsed=results;let h='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">&#128203; 取込確認</div><div style="font-size:13px;color:#27ae60;font-weight:700;margin-bottom:12px">✅ '+results.length+'件のデータを読み取りました</div><div style="max-height:300px;overflow-y:auto;margin-bottom:12px">';results.forEach(r=>{h+='<div style="background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #eee"><div class="item-name">'+esc(r.title||'（タイトル不明）')+'</div><div class="price-row"><span class="price-tag">売価 '+fmt(r.sell_price)+'</span><span class="price-tag">送料 '+fmt(r.shipping_fee)+'</span><span class="price-tag" style="color:#8e44ad;font-weight:700">純利益 '+fmt(r.net_profit)+'</span></div><div class="item-sub">'+esc(r.sold_at)+'</div></div>'});h+='</div><div style="display:flex;gap:8px"><button class="save-btn" style="background:#aaa;flex:1;margin-top:0" onclick="openMercariImport()">やり直す</button><button class="save-btn" style="flex:2;margin-top:0" onclick="saveMercariData()">取込む</button></div></div>';document.getElementById('modal').innerHTML=h;document.getElementById('modal').classList.add('show')}
async function saveMercariData(){const results=window._mercariParsed||[];if(!results.length)return;for(const row of results){await sbFetch('sales',{method:'POST',body:JSON.stringify({sell_price:row.sell_price,shipping_fee:row.shipping_fee,net_profit:row.net_profit,sold_at:row.sold_at,note:row.title,fee_rate:10})})}await load();closeModal();alert(results.length+'件を取込みました！')}

function renderExpenses(){const totalExp=expenses.reduce((s,e)=>s+(e.amount||0),0);const monthlyData={};expenses.forEach(e=>{const m=(e.expense_date||'').slice(0,7);if(!m)return;if(!monthlyData[m])monthlyData[m]=0;monthlyData[m]+=(e.amount||0)});const CATS=[{value:'rent',label:'家賃',icon:'🏠'},{value:'packing',label:'梱包材',icon:'📦'},{value:'shipping',label:'送料',icon:'🚚'},{value:'platform',label:'手数料',icon:'💳'},{value:'equipment',label:'備品',icon:'🛠️'},{value:'other',label:'その他',icon:'📝'}];let h='<div class="row-between"><h2 class="section-title">経費一覧</h2><button class="add-btn" style="background:#e67e22" onclick="openAddExpense()">+ 追加</button></div>';if(expenses.length>0){h+='<div class="card" style="background:#fff3e0;border:1px solid #ffe0b2"><div style="font-size:12px;color:#888;margin-bottom:4px">経費合計（全期間）</div><div style="font-size:22px;font-weight:700;color:#e67e22">'+fmt(totalExp)+'</div></div>';}if(!expenses.length)h+='<div class="empty">経費を登録してください</div>';expenses.forEach(e=>{const cat=CATS.find(c=>c.value===e.category)||{label:e.category||'その他',icon:'📝'};h+='<div class="card"><div class="row-between"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px">'+cat.icon+'</span><span style="font-size:12px;font-weight:700;color:#e67e22;background:#fff3e0;padding:2px 8px;border-radius:6px">'+esc(cat.label)+'</span>'+(e.is_recurring?'<span style="font-size:10px;color:#fff;background:#e67e22;padding:1px 6px;border-radius:4px">毎月</span>':'')+'</div><span class="item-sub">'+esc(e.expense_date||'')+'</span></div><div style="font-size:15px;font-weight:700;color:#2c1010;margin:4px 0">'+esc(e.note||'')+'</div><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:18px;font-weight:700;color:#e67e22">'+fmt(e.amount)+'</div><div style="display:flex;gap:6px">'+(e.photo_url?'<button style="background:#fff3e0;color:#e67e22;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer" onclick="viewExpensePhoto(''+esc(e.photo_url)+'')">📷</button>':'')+'<button class="edit-btn" onclick="openEditExpense('+e.id+')">編集</button></div></div></div>'});document.getElementById('tab-expenses').innerHTML=h}
function viewExpensePhoto(url){document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">📷 領収書</div><img src="'+url+'" style="width:100%;border-radius:10px;margin-top:8px"></div>';document.getElementById('modal').classList.add('show')}
function openAddExpense(){const CATS=[{value:'rent',label:'🏠 家賃'},{value:'packing',label:'📦 梱包材'},{value:'shipping',label:'🚚 送料'},{value:'platform',label:'💳 手数料'},{value:'equipment',label:'🛠️ 備品'},{value:'other',label:'📝 その他'}];const opts=CATS.map(c=>'<option value="'+c.value+'">'+c.label+'</option>').join('');document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">💴 経費登録</div><label class="field-label">カテゴリ *</label><select class="field-input" id="f-exp-cat">'+opts+'</select><label class="field-label">金額(円) *</label><input class="field-input" id="f-exp-amount" type="number" placeholder="例: 50000"><label class="field-label">日付 *</label><input class="field-input" id="f-exp-date" type="date" value="'+today()+'"><label class="field-label">メモ</label><input class="field-input" id="f-exp-note" placeholder="例: ○○マンション6月分"><label class="field-label"><input type="checkbox" id="f-exp-recurring" style="margin-right:6px">毎月の固定費</label><label class="field-label">領収書写真</label><div class="photo-upload" onclick="document.getElementById('f-exp-photo').click()">&#128247; 領収書を撮影・選択</div><input type="file" id="f-exp-photo" accept="image/*" capture="environment" style="display:none" onchange="previewExpensePhoto(this)"><img id="exp-photo-preview" class="photo-preview"><button class="save-btn" style="background:#e67e22" onclick="saveExpense(null)">登録する</button></div>';document.getElementById('modal').classList.add('show')}
function openEditExpense(id){const e=expenses.find(e=>e.id===id);if(!e)return;const CATS=[{value:'rent',label:'🏠 家賃'},{value:'packing',label:'📦 梱包材'},{value:'shipping',label:'🚚 送料'},{value:'platform',label:'💳 手数料'},{value:'equipment',label:'🛠️ 備品'},{value:'other',label:'📝 その他'}];const opts=CATS.map(c=>'<option value="'+c.value+'"'+(c.value===e.category?' selected':'')+'>'+c.label+'</option>').join('');document.getElementById('modal').innerHTML='<div class="modal-box"><button class="close-btn" onclick="closeModal()">&#x2715;</button><div class="modal-title">💴 経費編集</div>'+(e.photo_url?'<img src="'+esc(e.photo_url)+'" style="width:100%;height:150px;object-fit:cover;border-radius:10px;margin-bottom:10px">':'')+'<label class="field-label">カテゴリ *</label><select class="field-input" id="f-exp-cat">'+opts+'</select><label class="field-label">金額(円) *</label><input class="field-input" id="f-exp-amount" type="number" value="'+e.amount+'"><label class="field-label">日付 *</label><input class="field-input" id="f-exp-date" type="date" value="'+esc(e.expense_date||today())+'"><label class="field-label">メモ</label><input class="field-input" id="f-exp-note" value="'+esc(e.note||'')+'"><label class="field-label"><input type="checkbox" id="f-exp-recurring"'+(e.is_recurring?' checked':'')+' style="margin-right:6px">毎月の固定費</label><label class="field-label">領収書写真を変更</label><div class="photo-upload" onclick="document.getElementById('f-exp-photo').click()">&#128247; 領収書を撮影・選択</div><input type="file" id="f-exp-photo" accept="image/*" capture="environment" style="display:none" onchange="previewExpensePhoto(this)"><img id="exp-photo-preview" class="photo-preview"><button class="save-btn" style="background:#e67e22" onclick="saveExpense('+id+')">保存する</button></div>';document.getElementById('modal').classList.add('show')}
function previewExpensePhoto(input){if(input.files&&input.files[0]){const reader=new FileReader();reader.onload=e=>{const img=document.getElementById('exp-photo-preview');img.src=e.target.result;img.style.display='block'};reader.readAsDataURL(input.files[0])}}
async function saveExpense(id){const amount=+document.getElementById('f-exp-amount').value;if(!amount)return alert('金額を入力してください');let photo_url=id?(expenses.find(e=>e.id===id)||{}).photo_url:null;const photoFile=document.getElementById('f-exp-photo').files[0];if(photoFile){const url=await uploadPhoto(photoFile);if(url)photo_url=url}const row={category:document.getElementById('f-exp-cat').value,amount,expense_date:document.getElementById('f-exp-date').value,note:document.getElementById('f-exp-note').value,is_recurring:document.getElementById('f-exp-recurring').checked,photo_url};if(id)await sbFetch('expenses?id=eq.'+id,{method:'PATCH',body:JSON.stringify(row)});else await sbFetch('expenses',{method:'POST',body:JSON.stringify(row)});await load();closeModal()}
function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('modal').innerHTML=''}
const urlParams=new URLSearchParams(location.search);
const scannedCode=urlParams.get('code');
load().then(()=>{if(scannedCode){const item=items.find(i=>i.code===scannedCode);if(item){showTab('items',document.querySelectorAll('.nav-btn')[1]);searchWord=scannedCode;renderItems()}}});
</script>
</body>
</html>
